services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp_dev_only}
      POSTGRES_DB: erp
    ports:
      # Bind to localhost only — do not expose Postgres to the LAN in dev.
      - "127.0.0.1:5432:5432"
    volumes:
      - erp_pg_data:/var/lib/postgresql/data

volumes:
  erp_pg_data:
